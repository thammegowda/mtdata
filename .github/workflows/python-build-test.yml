# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: mtdata build test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

env:
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:  #exclude some to reduce number of jobs
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.13"
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: "${{ matrix.python-version }}"
        cache: pip
    - name: Cache mtdata datasets
      uses: actions/cache@v4
      with:
        path: ~/.mtdata
        key: mtdata-cache-${{ matrix.os }}
    - name: Install dependencies
      run: |
        pip install --upgrade pip setuptools
        python --version
        pip --version
    - name: Install module
      run: |
        pip install .[hf,test]
    - name: Test with pytest
      run: |
         python -m pytest
    - name: Test CLI from other dir
      run: |
        cd iso-langs
        python -m mtdata -ri list -id -l eng-kan
